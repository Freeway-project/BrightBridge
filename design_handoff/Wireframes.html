<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Caveat', cursive; }

.wf { font-family: 'Caveat', cursive; overflow: hidden; background: white; }
.wf * { font-family: 'Caveat', cursive; }

/* Sidebar */
.sb { width: 196px; min-width: 196px; background: #1c1c2e; display: flex; flex-direction: column; }
.sb-logo { padding: 14px 16px; border-bottom: 1px solid #2e2e48; display: flex; flex-direction: column; gap: 2px; }
.sb-logo-name { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 0.3px; }
.sb-logo-role { font-size: 12px; color: #7b7b9e; }
.sb-nav { flex: 1; padding: 6px 0; }
.ni { padding: 7px 16px; font-size: 15px; color: #9090b8; display: flex; align-items: center; gap: 9px; cursor: pointer; }
.ni.a { background: rgba(72,112,255,0.15); color: #7f9fff; border-left: 3px solid #4870ff; padding-left: 13px; }
.ni-dot { width: 7px; height: 7px; border-radius: 1px; background: currentColor; flex-shrink: 0; opacity: 0.7; }
.sb-user { padding: 12px 16px; border-top: 1px solid #2e2e48; display: flex; align-items: center; gap: 9px; }
.sb-avatar { width: 28px; height: 28px; border-radius: 50%; background: #4870ff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; flex-shrink: 0; }
.sb-uname { font-size: 13px; color: #9090b8; }

/* Topbar */
.topbar { height: 48px; border-bottom: 1px solid #e8e8f0; display: flex; align-items: center; padding: 0 20px; gap: 12px; background: white; flex-shrink: 0; }
.topbar-title { font-size: 18px; font-weight: 700; color: #111; flex: 1; }
.tb-badge-area { display: flex; align-items: center; gap: 8px; }

/* Badges */
.badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 20px; font-size: 12px; font-weight: 700; white-space: nowrap; }
.bg-gray { background: #f0f0f4; color: #555; border: 1px solid #d8d8e0; }
.bg-blue { background: #eef2ff; color: #4059c7; border: 1px solid #c7d2fe; }
.bg-yellow { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
.bg-green { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
.bg-red { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
.bg-orange { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
.bg-purple { background: #faf5ff; color: #7e22ce; border: 1px solid #e9d5ff; }

/* Buttons */
.btn { display: inline-flex; align-items: center; padding: 5px 14px; border-radius: 5px; font-family: 'Caveat', cursive; font-size: 14px; font-weight: 700; cursor: pointer; border: 1.5px solid; line-height: 1; white-space: nowrap; }
.btn-p { background: #4870ff; color: white; border-color: #4870ff; }
.btn-o { background: white; color: #333; border-color: #ccc; }
.btn-g { background: #f0fdf4; color: #15803d; border-color: #86efac; }
.btn-r { background: #fef2f2; color: #b91c1c; border-color: #fca5a5; }
.btn-sm { padding: 3px 9px; font-size: 13px; }

/* Table */
.tbl { width: 100%; border-collapse: collapse; font-size: 14px; }
.tbl th { text-align: left; padding: 7px 10px; background: #f6f6fa; border-bottom: 1.5px solid #e4e4ee; font-size: 12px; color: #777; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
.tbl td { padding: 8px 10px; border-bottom: 1px solid #f0f0f6; vertical-align: middle; font-size: 14px; }
.tbl tr:hover td { background: #fafbff; }

/* Stat cards */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
.sc { background: white; border: 1.5px solid #e4e4ee; border-radius: 8px; padding: 14px 16px; }
.sc-val { font-size: 30px; font-weight: 700; color: #111; line-height: 1; }
.sc-lbl { font-size: 13px; color: #888; margin-top: 3px; }
.sc-sub { font-size: 12px; color: #4870ff; margin-top: 2px; }

/* Forms */
.fl { margin-bottom: 13px; }
.fl label { display: block; font-size: 12px; color: #666; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
.fi { width: 100%; height: 31px; background: #f7f7fc; border: 1.5px dashed #bbbbd0; border-radius: 4px; padding: 0 9px; font-family: 'Caveat', cursive; font-size: 15px; color: #333; }
.fi.pre { background: #eef2ff; border-style: solid; border-color: #c7d2fe; color: #4059c7; }
.fta { width: 100%; height: 60px; background: #f7f7fc; border: 1.5px dashed #bbbbd0; border-radius: 4px; padding: 7px 9px; font-family: 'Caveat', cursive; font-size: 15px; color: #333; resize: none; }

/* Step nav */
.steps { width: 172px; min-width: 172px; border-right: 1px solid #e8e8f0; background: #fafafa; padding: 12px 0; }
.step { padding: 9px 12px; display: flex; align-items: flex-start; gap: 9px; cursor: pointer; }
.step.sa { background: #eef2ff; }
.sdot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.sdot-done { background: #22c55e; color: white; }
.sdot-act { background: #4870ff; color: white; }
.sdot-pend { background: #e0e0ec; color: #888; }
.slabel { font-size: 14px; font-weight: 700; color: #222; line-height: 1.2; }
.ssub { font-size: 12px; color: #999; }

/* Info panel */
.rp { width: 210px; min-width: 210px; border-left: 1px solid #e8e8f0; background: #fafafa; padding: 14px; display: flex; flex-direction: column; gap: 14px; }
.rp-block { }
.rp-title { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.rp-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 5px; }
.rp-key { color: #888; }
.rp-val { color: #111; font-weight: 600; }

/* Tabs */
.tabs { display: flex; border-bottom: 1.5px solid #e0e0ee; gap: 0; flex-shrink: 0; }
.tab { padding: 8px 16px; font-size: 15px; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -1.5px; color: #666; }
.tab.ta { border-bottom-color: #4870ff; color: #4870ff; font-weight: 700; }

/* Checklist rows */
.ck-section { background: #f8f8fc; padding: 7px 12px; font-size: 13px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #eee; }
.ck-row { display: grid; grid-template-columns: 1fr 110px 1fr 140px 80px; gap: 8px; align-items: center; padding: 7px 10px; border-bottom: 1px solid #f0f0f6; font-size: 14px; }
.ck-row:hover { background: #fafbff; }
.ck-dd { height: 28px; background: #f5f5fa; border: 1.5px dashed #bbb; border-radius: 4px; font-family: 'Caveat',cursive; font-size: 13px; padding: 0 6px; }

/* Thread */
.thread-msg { display: flex; gap: 10px; margin-bottom: 13px; }
.t-av { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; flex-shrink: 0; }
.t-bubble { background: #f4f4fa; border-radius: 0 8px 8px 8px; padding: 8px 12px; flex: 1; }
.t-meta { font-size: 11px; color: #999; margin-bottom: 3px; display: flex; gap: 8px; align-items: center; }
.t-txt { font-size: 14px; color: #222; }
.t-tag { background: #eef2ff; color: #4059c7; border-radius: 3px; padding: 1px 5px; font-size: 11px; }

/* Filter bar */
.fbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.fbar-in { height: 30px; background: white; border: 1.5px solid #ddd; border-radius: 5px; padding: 0 10px; font-family: 'Caveat',cursive; font-size: 14px; }

/* Status flow */
.flow-step { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.flow-node { border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 700; text-align: center; min-width: 120px; }
.flow-arrow { font-size: 18px; color: #bbb; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

/* ─── SHARED COMPONENTS ─── */
const Sidebar = ({role, active}) => {
  const navs = {
    ta: [['My Courses', true],['My Issues'],['Messages']],
    admin: [['Review Queue', true],['All Courses'],['Issues'],['Reports']],
    comm: [['Handoff Queue', true],['Instructor Qs'],['Messages']],
    instructor: [['My Courses', true],['Questions'],['Approvals']],
  };
  const roleLabel = {ta:'Teaching Assistant', admin:'Admin Reviewer', comm:'Communication Dept', instructor:'Instructor'};
  const userNames = {ta:'Alex T.', admin:'Maria S.', comm:'Jordan K.', instructor:'Prof. Chen'};
  return (
    <div className="sb">
      <div className="sb-logo">
        <div className="sb-logo-name">BrightMigrate</div>
        <div className="sb-logo-role">{roleLabel[role]}</div>
      </div>
      <div className="sb-nav">
        {(navs[role]||[]).map(([label, act], i) => (
          <div key={i} className={`ni${act ? ' a' : ''}`}>
            <div className="ni-dot"></div>{label}
          </div>
        ))}
      </div>
      <div className="sb-user">
        <div className="sb-avatar">{userNames[role][0]}</div>
        <div className="sb-uname">{userNames[role]}</div>
      </div>
    </div>
  );
};

const Badge = ({label, color='gray'}) => <span className={`badge bg-${color}`}>{label}</span>;

// Canonical status keys → display labels
const STATUS_LABELS = {
  course_created:           'Course Created',
  assigned_to_ta:           'Assigned to TA',
  ta_review_in_progress:    'TA Review In Progress',
  submitted_to_admin:       'Submitted to Admin',
  admin_changes_requested:  'Changes Requested',
  ready_for_instructor:     'Ready for Instructor',
  sent_to_instructor:       'Sent to Instructor',
  instructor_questions:     'Instructor Questions',
  instructor_approved:      'Instructor Approved',
  final_approved:           'Final Approved',
};
const STATUS_COLORS = {
  course_created:           'gray',
  assigned_to_ta:           'gray',
  ta_review_in_progress:    'blue',
  submitted_to_admin:       'yellow',
  admin_changes_requested:  'orange',
  ready_for_instructor:     'purple',
  sent_to_instructor:       'purple',
  instructor_questions:     'orange',
  instructor_approved:      'green',
  final_approved:           'green',
};
const SBadge = ({status}) => <Badge label={STATUS_LABELS[status]||status} color={STATUS_COLORS[status]||'gray'} />;

const statusMap = {
  'Not Started': 'gray', 'In Progress': 'blue', 'Submitted': 'yellow',
  'Fix Requested': 'orange', 'Admin Approved': 'green', 'Sent to Instructor': 'purple',
  'Instructor Q': 'orange', 'Final Approved': 'green', 'Pass': 'green',
  'Fix Needed': 'orange', 'Missing': 'red', 'Escalate': 'red', 'N/A': 'gray',
};

/* ─── SCREEN 1: LOGIN ─── */
const LoginScreen = () => (
  <div className="wf" style={{width:900,height:620,background:'#f5f6fc',display:'flex',alignItems:'center',justifyContent:'center'}}>
    <div style={{display:'flex',gap:0,boxShadow:'0 4px 32px rgba(0,0,0,0.10)',borderRadius:10,overflow:'hidden',width:700,height:420}}>
      <div style={{width:280,background:'#1c1c2e',padding:'36px 30px',display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:22,fontWeight:700,color:'white',marginBottom:8}}>BrightMigrate</div>
          <div style={{fontSize:14,color:'#7b7b9e',lineHeight:1.4}}>Course Migration Review Platform</div>
        </div>
        <div style={{fontSize:13,color:'#555577'}}>Moodle → Brightspace workflow</div>
      </div>
      <div style={{flex:1,background:'white',padding:'36px 32px',display:'flex',flexDirection:'column',justifyContent:'center',gap:16}}>
        <div style={{fontSize:22,fontWeight:700,color:'#111',marginBottom:4}}>Sign in</div>
        <div className="fl"><label>Email</label><div className="fi" style={{display:'flex',alignItems:'center',color:'#aaa',fontSize:14}}>you@college.edu</div></div>
        <div className="fl"><label>Password</label><div className="fi" style={{display:'flex',alignItems:'center',color:'#aaa',fontSize:14}}>••••••••••</div></div>
        <div className="fl">
          <label>Role</label>
          <select className="fi" style={{appearance:'none',cursor:'pointer'}}>
            <option>Teaching Assistant</option>
            <option>Admin Reviewer</option>
            <option>Communication Dept</option>
            <option>Instructor</option>
            <option>Super Admin</option>
          </select>
        </div>
        <div className="btn btn-p" style={{alignSelf:'stretch',justifyContent:'center',marginTop:4,fontSize:16}}>Sign in → Route to Dashboard</div>
        <div style={{fontSize:12,color:'#bbb',textAlign:'center'}}>SSO via college identity provider supported</div>
      </div>
    </div>
  </div>
);

/* ─── SCREEN 2: TA DASHBOARD ─── */
const TADashboard = () => {
  const courses = [
    ['BIO 101-A','Intro to Biology','Fall 2025','01','ta_review_in_progress','Sep 12','1h 24m',2],
    ['CHEM 201-B','Organic Chemistry','Fall 2025','02','assigned_to_ta','Sep 14','—',0],
    ['HIST 110','World History','Fall 2025','01','submitted_to_admin','Sep 8','2h 10m',1],
    ['MATH 301-A','Calculus III','Spring 2026','01','admin_changes_requested','Sep 5','3h 02m',4],
  ];
  const colors = STATUS_COLORS;
  return (
    <div className="wf" style={{width:1280,height:820,display:'flex'}}>
      <Sidebar role="ta" />
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div className="topbar"><div className="topbar-title">My Courses</div>
          <div style={{fontSize:13,color:'#aaa'}}>Fall 2025 · Term 3</div>
          <div className="btn btn-o btn-sm">+ New Review</div>
          <div style={{width:28,height:28,border:'1.5px solid #ddd',borderRadius:50,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#888'}}>🔔</div>
        </div>
        <div style={{flex:1,padding:'20px 24px',background:'#f7f7fc',overflowY:'hidden'}}>
          <div className="stats">
            {[['12','Assigned','All terms'],['4','TA In Progress','Currently active'],['6','Submitted to Admin','Awaiting review'],['2','Changes Requested','Needs attention']].map(([v,l,s],i)=>(
              <div className="sc" key={i}>
                <div className="sc-val" style={{color:['#111','#4870ff','#b45309','#b91c1c'][i]}}>{v}</div>
                <div className="sc-lbl">{l}</div>
                <div className="sc-sub">{s}</div>
              </div>
            ))}
          </div>
          <div className="fbar">
            <input className="fbar-in" placeholder="🔍  Search course code or title..." style={{width:220}} readOnly />
            <select className="fbar-in"><option>All Terms</option><option>Fall 2025</option><option>Spring 2026</option></select>
            <select className="fbar-in"><option>All Statuses</option><option>In Progress</option><option>Submitted</option></select>
            <select className="fbar-in"><option>All Instructors</option></select>
          </div>
          <div style={{background:'white',border:'1.5px solid #e4e4ee',borderRadius:8,overflow:'hidden'}}>
            <table className="tbl">
              <thead><tr>
                <th>Course Code</th><th>Title</th><th>Term</th><th>Sec.</th>
                <th>Status</th><th>Assigned</th><th>Time Spent</th><th>Issues</th><th>Action</th>
              </tr></thead>
              <tbody>{courses.map(([code,title,term,sec,status,date,time,issues],i)=>(
                <tr key={i}><td><strong>{code}</strong></td><td>{title}</td><td>{term}</td><td>{sec}</td>
                  <td><Badge label={STATUS_LABELS[status]||status} color={STATUS_COLORS[status]||'gray'} /></td>
                  <td style={{color:'#888'}}>{date}</td>
                  <td style={{fontWeight:600}}>{time}</td>
                  <td>{issues > 0 ? <span style={{background:'#fef2f2',color:'#b91c1c',borderRadius:20,padding:'1px 8px',fontSize:12,fontWeight:700}}>{issues} open</span> : <span style={{color:'#aaa',fontSize:13}}>—</span>}</td>
                  <td>
                    {status==='ta_review_in_progress' && <div className="btn btn-p btn-sm">Continue →</div>}
                    {status==='assigned_to_ta' && <div className="btn btn-o btn-sm">Start Review</div>}
                    {status==='submitted_to_admin' && <div className="btn btn-o btn-sm" style={{color:'#888'}}>View</div>}
                    {status==='admin_changes_requested' && <div className="btn btn-r btn-sm">Fix Issues →</div>}
                  </td>
                </tr>
              ))}</tbody>
            </table>
          </div>
          <div style={{fontSize:13,color:'#bbb',marginTop:10,textAlign:'right'}}>Showing 4 of 12 courses · Load more</div>
        </div>
      </div>
    </div>
  );
};

/* ─── SCREEN 3: TA COURSE REVIEW WORKSPACE — METADATA ─── */
const TAWorkspaceMetadata = () => (
  <div className="wf" style={{width:1280,height:900,display:'flex'}}>
    <Sidebar role="ta" />
    <div style={{flex:1,display:'flex',flexDirection:'column'}}>
      <div className="topbar" style={{height:'auto',padding:'10px 20px',flexWrap:'wrap',gap:8}}>
        <div style={{flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:18,fontWeight:700}}>BIO 101-A</span>
            <span style={{fontSize:15,color:'#666'}}>Intro to Biology</span>
            <Badge label="In Progress" color="blue" />
          </div>
          <div style={{fontSize:13,color:'#aaa',marginTop:2}}>Fall 2025 · Section 01 · Instructor: Prof. Lee</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <div className="btn btn-o btn-sm">Save Draft</div>
          <div className="btn btn-p btn-sm">Save & Continue →</div>
        </div>
      </div>
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        {/* Step nav */}
        <div className="steps">
          {[['1','Metadata','Course info','done'],['2','Review Matrix','Checklist items','act'],['3','Syllabus & GB','Docs review','pend'],['4','Issue Log','Track problems','pend'],['5','Submit','Final review','pend']].map(([n,l,s,state],i)=>(
            <div key={i} className={`step${state==='act'?' sa':''}`}>
              <div className={`sdot sdot-${state}`}>{state==='done'?'✓':n}</div>
              <div><div className="slabel">{l}</div><div className="ssub">{s}</div></div>
            </div>
          ))}
          <div style={{borderTop:'1px dashed #ddd',margin:'10px 12px',paddingTop:10}}>
            <div style={{fontSize:11,color:'#bbb',fontWeight:700,textTransform:'uppercase',marginBottom:6}}>Review Timer</div>
            <div style={{fontSize:26,fontWeight:700,color:'#4870ff'}}>01:24:07</div>
            <div style={{fontSize:12,color:'#bbb',marginTop:2}}>Running · Session 2</div>
            <div className="btn btn-o btn-sm" style={{marginTop:8,fontSize:12}}>⏸ Pause</div>
          </div>
        </div>
        {/* Form area */}
        <div style={{flex:1,padding:'20px 22px',background:'#f7f7fc',overflowY:'auto'}}>
          <div style={{fontSize:13,color:'#aaa',marginBottom:14}}>Step 1 of 5 · Course Metadata · Auto-saved 2 min ago</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 20px'}}>
            <div className="fl"><label>Course Code <span style={{color:'red'}}>*</span></label><div className="fi pre">BIO 101-A</div></div>
            <div className="fl"><label>Course Title</label><div className="fi pre">Intro to Biology</div></div>
            <div className="fl"><label>Term <span style={{color:'red'}}>*</span></label>
              <select className="fi"><option>Fall 2025</option></select></div>
            <div className="fl"><label>Section(s)</label><div className="fi pre">01</div></div>
            <div className="fl" style={{gridColumn:'1/-1'}}><label>Brightspace Course URL</label>
              <div className="fi" style={{display:'flex',alignItems:'center',gap:6,color:'#4870ff',textDecoration:'underline',fontSize:13}}>https://brightspace.college.edu/d2l/home/BIO101A</div></div>
            <div className="fl" style={{gridColumn:'1/-1'}}><label>Moodle Course URL (Archive)</label>
              <div className="fi" style={{display:'flex',alignItems:'center',gap:6,color:'#4870ff',textDecoration:'underline',fontSize:13}}>https://moodle.college.edu/course/view.php?id=4827</div></div>
            <div className="fl"><label>Reviewer</label><div className="fi pre">Alex T. (TA)</div></div>
            <div className="fl"><label>Review Date</label><div className="fi pre">Sep 12, 2025</div></div>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "font": "System UI",
  "theme": "Blue Steel",
  "density": "relaxed"
}/*EDITMODE-END*/;

const THEMES = {
  'Blue Steel':   { accent:'#3b63ee', sidebar:'#1c1c2e', sidebarText:'#9090b8' },
  'Slate':        { accent:'#475569', sidebar:'#1e293b', sidebarText:'#94a3b8' },
  'Teal':         { accent:'#0d9488', sidebar:'#134e4a', sidebarText:'#99d6d0' },
  'Indigo':       { accent:'#6366f1', sidebar:'#1e1b3a', sidebarText:'#a5b4fc' },
  'Warm Neutral': { accent:'#b45309', sidebar:'#292524', sidebarText:'#a8a29e' },
};

const applyTheme = (t) => {
  let el = document.getElementById('theme-override');
  if (!el) { el = document.createElement('style'); el.id = 'theme-override'; document.head.appendChild(el); }
  el.textContent = `
    .sb { background: ${t.sidebar} !important; }
    .sb-logo-role, .ni, .sb-uname { color: ${t.sidebarText} !important; }
    .ni.a { background: ${t.accent}22 !important; color: ${t.accent}dd !important; border-left-color: ${t.accent} !important; }
    .btn-p { background: ${t.accent} !important; border-color: ${t.accent} !important; }
    .tab.ta { border-bottom-color: ${t.accent} !important; color: ${t.accent} !important; }
    .sdot-act { background: ${t.accent} !important; }
    .step.sa { background: ${t.accent}18 !important; }
    .sc-sub { color: ${t.accent} !important; }
    .badge.bg-blue { background: ${t.accent}18 !important; color: ${t.accent} !important; border-color: ${t.accent}44 !important; }
  `;
};

const WireframeTweaks = () => {
  const { TweaksPanel, TweakSection, TweakSelect, useTweaks } = window;
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    const fontFamilies = {
      'System UI': 'system-ui, -apple-system, sans-serif',
      'Caveat': "'Caveat', cursive",
      'Patrick Hand': "'Patrick Hand', cursive",
      'Kalam': "'Kalam', cursive",
    };
    const ff = fontFamilies[tweaks.font] || 'system-ui, sans-serif';
    let fo = document.getElementById('font-override');
    if (!fo) { fo = document.createElement('style'); fo.id = 'font-override'; document.head.appendChild(fo); }
    fo.textContent =
      `body, .wf, .wf *, .sb, .sb *, select, input, textarea { font-family: ${ff} !important; }`;
  }, [tweaks.font]);

  React.useEffect(() => {
    const t = THEMES[tweaks.theme] || THEMES['Blue Steel'];
    applyTheme(t);
  }, [tweaks.theme]);

  // Apply on mount
  React.useEffect(() => {
    applyTheme(THEMES[TWEAK_DEFAULTS.theme]);
  }, []);

  return (
    <TweaksPanel>
      <TweakSection label="Color Theme">
        <TweakSelect id="theme" label="Theme"
          options={Object.keys(THEMES)}
          value={tweaks.theme} onChange={v => setTweak('theme', v)} />
        <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
          {Object.entries(THEMES).map(([name, t]) => (
            <div key={name} onClick={() => setTweak('theme', name)}
              title={name}
              style={{width:28,height:28,borderRadius:6,background:t.accent,cursor:'pointer',border:tweaks.theme===name?'3px solid #111':'3px solid transparent',boxSizing:'border-box'}}>
            </div>
          ))}
        </div>
      </TweakSection>
      <TweakSection label="Font">
        <TweakSelect id="font" label="Wireframe Font"
          options={['System UI','Caveat','Patrick Hand','Kalam']}
          value={tweaks.font} onChange={v => setTweak('font', v)} />
      </TweakSection>
      <TweakSection label="Density">
        <TweakSelect id="density" label="Row Density"
          options={['compact','normal','relaxed']}
          value={tweaks.density} onChange={v => setTweak('density', v)} />
      </TweakSection>
    </TweaksPanel>
  );
};

ReactDOM.createRoot(document.getElementById('tweaks')).render(<WireframeTweaks />);
</script>
<div id="tweaks"></div>
</body>
