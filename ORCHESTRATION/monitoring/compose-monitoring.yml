version: '3.8'

# Monitoring stack for CourseBridge (non-prod).
# Deploy alongside the app stack on the same `swarm-network` overlay so that
# Prometheus can scrape app services by their swarm service name.
#
#   docker stack deploy -c compose-monitoring.yml monitoring
#
# See README.md for required env vars and the metrics_token secret.

services:
  prometheus:
    image: prom/prometheus:v2.55.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    secrets:
      - source: metrics_token
        target: /etc/prometheus/metrics_token
        mode: 0400
    networks:
      - swarm-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints: [node.role == manager]
      labels:
        # Not exposed externally by default. Uncomment to publish behind the
        # admin IP allowlist; verify Host() matches your DNS.
        - "traefik.enable=false"
        # - "traefik.enable=true"
        # - "traefik.http.routers.prometheus.rule=Host(`${PROMETHEUS_HOST}`)"
        # - "traefik.http.routers.prometheus.entrypoints=websecure"
        # - "traefik.http.routers.prometheus.tls.certresolver=letsencrypt"
        # - "traefik.http.routers.prometheus.middlewares=ip-allow-admin@file"
        # - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
        # - "traefik.swarm.network=swarm-network"

  grafana:
    image: grafana/grafana:11.3.0
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - swarm-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints: [node.role == manager]
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_HOST}`)"
        - "traefik.http.routers.grafana.entrypoints=websecure"
        - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
        - "traefik.http.routers.grafana.middlewares=ip-allow-admin@file"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"
        - "traefik.swarm.network=swarm-network"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host'
      - '--collector.textfile.directory=/host/var/lib/node_exporter/textfile_collector'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    networks:
      - swarm-network
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=false"

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    env_file:
      - .env
    environment:
      - DATA_SOURCE_NAME=${POSTGRES_EXPORTER_DSN}
      - PG_EXPORTER_EXCLUDE_DATABASES=template0,template1
    networks:
      - swarm-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints: [node.role == manager]
      labels:
        - "traefik.enable=false"

networks:
  swarm-network:
    external: true

volumes:
  prometheus_data:
  grafana_data:

secrets:
  metrics_token:
    file: ./secrets/metrics_token
