version: '3.8'

services:
  coursebridge-test:
    image: okanagan/coursebridge-test:latest
    secrets:
      - app_base_url_coursebridge-test
      - auth_provider_coursebridge-test
      - session_secret_coursebridge-test
      - db_provider_coursebridge-test
      - database_url_coursebridge-test
      - migration_baseline_on_existing_coursebridge-test
      - azure_oidc_tenant_id_coursebridge-test
      - azure_oidc_client_id_coursebridge-test
      - azure_oidc_client_secret_coursebridge-test
      - azure_oidc_issuer_coursebridge-test
      - azure_oidc_authorization_endpoint_coursebridge-test
      - azure_oidc_token_endpoint_coursebridge-test
      - azure_oidc_jwks_uri_coursebridge-test
      - azure_oidc_redirect_uri_coursebridge-test
      - azure_oidc_post_logout_redirect_uri_coursebridge-test
      - azure_oidc_scopes_coursebridge-test
      - azure_oidc_allowed_tenant_id_coursebridge-test
      - next_server_actions_encryption_key_coursebridge-test
      - next_public_posthog_token_coursebridge-test
      - next_public_posthog_key_coursebridge-test
      - next_public_posthog_host_coursebridge-test
      - next_public_posthog_project_id_coursebridge-test
      - next_public_posthog_dashboard_url_coursebridge-test
      - next_public_sentry_dsn_coursebridge-test
      - sentry_org_coursebridge-test
      - sentry_project_coursebridge-test
      - sentry_auth_token_coursebridge-test
      - next_public_rapidapi_key_coursebridge-test
      - groq_api_key_coursebridge-test
      - next_public_force_maintenance_coursebridge-test
      - next_public_app_version_coursebridge-test
      - git_commit_sha_coursebridge-test
    environment:
      - APP_BASE_URL_FILE=/run/secrets/app_base_url_coursebridge-test
      - AUTH_PROVIDER_FILE=/run/secrets/auth_provider_coursebridge-test
      - SESSION_SECRET_FILE=/run/secrets/session_secret_coursebridge-test
      - DB_PROVIDER_FILE=/run/secrets/db_provider_coursebridge-test
      - DATABASE_URL_FILE=/run/secrets/database_url_coursebridge-test
      - MIGRATION_BASELINE_ON_EXISTING_FILE=/run/secrets/migration_baseline_on_existing_coursebridge-test
      - AZURE_OIDC_TENANT_ID_FILE=/run/secrets/azure_oidc_tenant_id_coursebridge-test
      - AZURE_OIDC_CLIENT_ID_FILE=/run/secrets/azure_oidc_client_id_coursebridge-test
      - AZURE_OIDC_CLIENT_SECRET_FILE=/run/secrets/azure_oidc_client_secret_coursebridge-test
      - AZURE_OIDC_ISSUER_FILE=/run/secrets/azure_oidc_issuer_coursebridge-test
      - AZURE_OIDC_AUTHORIZATION_ENDPOINT_FILE=/run/secrets/azure_oidc_authorization_endpoint_coursebridge-test
      - AZURE_OIDC_TOKEN_ENDPOINT_FILE=/run/secrets/azure_oidc_token_endpoint_coursebridge-test
      - AZURE_OIDC_JWKS_URI_FILE=/run/secrets/azure_oidc_jwks_uri_coursebridge-test
      - AZURE_OIDC_REDIRECT_URI_FILE=/run/secrets/azure_oidc_redirect_uri_coursebridge-test
      - AZURE_OIDC_POST_LOGOUT_REDIRECT_URI_FILE=/run/secrets/azure_oidc_post_logout_redirect_uri_coursebridge-test
      - AZURE_OIDC_SCOPES_FILE=/run/secrets/azure_oidc_scopes_coursebridge-test
      - AZURE_OIDC_ALLOWED_TENANT_ID_FILE=/run/secrets/azure_oidc_allowed_tenant_id_coursebridge-test
      - NEXT_SERVER_ACTIONS_ENCRYPTION_KEY_FILE=/run/secrets/next_server_actions_encryption_key_coursebridge-test
      - NEXT_PUBLIC_POSTHOG_TOKEN_FILE=/run/secrets/next_public_posthog_token_coursebridge-test
      - NEXT_PUBLIC_POSTHOG_KEY_FILE=/run/secrets/next_public_posthog_key_coursebridge-test
      - NEXT_PUBLIC_POSTHOG_HOST_FILE=/run/secrets/next_public_posthog_host_coursebridge-test
      - NEXT_PUBLIC_POSTHOG_PROJECT_ID_FILE=/run/secrets/next_public_posthog_project_id_coursebridge-test
      - NEXT_PUBLIC_POSTHOG_DASHBOARD_URL_FILE=/run/secrets/next_public_posthog_dashboard_url_coursebridge-test
      - NEXT_PUBLIC_SENTRY_DSN_FILE=/run/secrets/next_public_sentry_dsn_coursebridge-test
      - SENTRY_ORG_FILE=/run/secrets/sentry_org_coursebridge-test
      - SENTRY_PROJECT_FILE=/run/secrets/sentry_project_coursebridge-test
      - SENTRY_AUTH_TOKEN_FILE=/run/secrets/sentry_auth_token_coursebridge-test
      - NEXT_PUBLIC_RAPIDAPI_KEY_FILE=/run/secrets/next_public_rapidapi_key_coursebridge-test
      - GROQ_API_KEY_FILE=/run/secrets/groq_api_key_coursebridge-test
      - NEXT_PUBLIC_FORCE_MAINTENANCE_FILE=/run/secrets/next_public_force_maintenance_coursebridge-test
      - NEXT_PUBLIC_APP_VERSION_FILE=/run/secrets/next_public_app_version_coursebridge-test
      - GIT_COMMIT_SHA_FILE=/run/secrets/git_commit_sha_coursebridge-test
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
    networks:
      - swarm-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints: [node.role == worker]
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.coursebridge-test.rule=Host(`coursebridge-test.okanagan.io`)"
        - "traefik.http.routers.coursebridge-test.entrypoints=websecure"
        - "traefik.http.routers.coursebridge-test.tls.certresolver=letsencrypt"
        - "traefik.http.routers.coursebridge-test.middlewares=ip-allow-admin@file,custom-errors@file"
        - "traefik.http.services.coursebridge-test.loadbalancer.server.port=3000"
        - "traefik.swarm.network=swarm-network"

networks:
  swarm-network:
    external: true

secrets:
  app_base_url_coursebridge-test:
    external: true
  auth_provider_coursebridge-test:
    external: true
  session_secret_coursebridge-test:
    external: true
  db_provider_coursebridge-test:
    external: true
  database_url_coursebridge-test:
    external: true
  migration_baseline_on_existing_coursebridge-test:
    external: true
  azure_oidc_tenant_id_coursebridge-test:
    external: true
  azure_oidc_client_id_coursebridge-test:
    external: true
  azure_oidc_client_secret_coursebridge-test:
    external: true
  azure_oidc_issuer_coursebridge-test:
    external: true
  azure_oidc_authorization_endpoint_coursebridge-test:
    external: true
  azure_oidc_token_endpoint_coursebridge-test:
    external: true
  azure_oidc_jwks_uri_coursebridge-test:
    external: true
  azure_oidc_redirect_uri_coursebridge-test:
    external: true
  azure_oidc_post_logout_redirect_uri_coursebridge-test:
    external: true
  azure_oidc_scopes_coursebridge-test:
    external: true
  azure_oidc_allowed_tenant_id_coursebridge-test:
    external: true
  next_server_actions_encryption_key_coursebridge-test:
    external: true
  next_public_posthog_token_coursebridge-test:
    external: true
  next_public_posthog_key_coursebridge-test:
    external: true
  next_public_posthog_host_coursebridge-test:
    external: true
  next_public_posthog_project_id_coursebridge-test:
    external: true
  next_public_posthog_dashboard_url_coursebridge-test:
    external: true
  next_public_sentry_dsn_coursebridge-test:
    external: true
  sentry_org_coursebridge-test:
    external: true
  sentry_project_coursebridge-test:
    external: true
  sentry_auth_token_coursebridge-test:
    external: true
  next_public_rapidapi_key_coursebridge-test:
    external: true
  groq_api_key_coursebridge-test:
    external: true
  next_public_force_maintenance_coursebridge-test:
    external: true
  next_public_app_version_coursebridge-test:
    external: true
  git_commit_sha_coursebridge-test:
    external: true
