services:
  postgres:
    image: postgres:17-alpine
    container_name: coursebridge-postgres-dev
    environment:
      POSTGRES_USER: coursebridge_user
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: coursebridge
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coursebridge_user -d coursebridge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
