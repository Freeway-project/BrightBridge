services:
  postgres:
    image: postgres:16
    container_name: coursebridge-pg
    environment:
      POSTGRES_USER: coursebridge_user
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: coursebridge
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coursebridge_user -d coursebridge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
