trigger:
  branches:
    include:
      - testing
  paths:
    include:
      - SOURCE/**
      - azure-pipelines-coursebridge-test.yml

pr:
  branches:
    include:
      - testing

variables:
  - name: imageName
    value: okanagan/coursebridge:latest
  - name: deployTarget
    value: webapps/coursebridge-test
  - name: selfHostedPool
    value: dockercloud-non-prod
  # Variable group should contain secrets such as:
  # - DOCKERHUB_USERNAME
  # - DOCKERHUB_PAT
  - group: coursebridge-deploy

stages:
  - stage: BuildAndPush
    displayName: Build and push test image
    jobs:
      - job: Build
        displayName: Build image and push to Docker Hub
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            clean: true

          - bash: |
              set -euo pipefail
              echo "$DOCKERHUB_PAT" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
              docker build --file SOURCE/Dockerfile --tag "$(imageName)" SOURCE
              docker push "$(imageName)"
            displayName: Build and push Docker image

  - stage: UpdateRemote
    displayName: Pull new image on testing (self-hosted)
    dependsOn: BuildAndPush
    jobs:
      - deployment: UpdateCourseBridgeTest
        displayName: Update CourseBridge on testing
        environment: dockercloud-test
        pool:
          name: $(selfHostedPool)
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  clean: true

                - bash: |
                    set -euo pipefail
                    cd /data
                    sudo ./update.sh $(deployTarget)
                    sudo docker service ps webapps_coursebridge-test --no-trunc
                    sudo docker service logs --since 5m webapps_coursebridge-test 2>&1 | tail -n 200
                  displayName: Update testing service
