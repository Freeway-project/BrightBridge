trigger:
  branches:
    include:
      - non-production/test
  paths:
    include:
      - SOURCE/**
      - ORCHESTRATION/**
      - azure-pipelines-coursebridge-test.yml

pr:
  branches:
    include:
      - non-production/test

variables:
  - name: imageName
    value: okanagan/coursebridge:latest
  - name: deployTarget
    value: webapps/coursebridge-test
  - name: remoteHost
    value: 16.52.3.43
  - name: remoteUser
    value: deploy
  # Variable group should contain secrets such as:
  # - DOCKERHUB_USERNAME
  # - DOCKERHUB_PAT
  # - DOCKERCLOUD_KNOWN_HOSTS
  # - DOCKERCLOUD_SSH_PUBLIC_KEY
  - group: coursebridge-deploy

stages:
  - stage: BuildAndPush
    displayName: Build and push test image
    jobs:
      - job: Build
        displayName: Build image and push to Docker Hub
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            clean: true

          - bash: |
              set -euo pipefail
              echo "$DOCKERHUB_PAT" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
              docker build --file SOURCE/Dockerfile --tag "$(imageName)" SOURCE
              docker push "$(imageName)"
            displayName: Build and push Docker image

  - stage: UpdateRemote
    displayName: Pull new image on testing
    dependsOn: BuildAndPush
    jobs:
      - deployment: UpdateCourseBridgeTest
        displayName: Update CourseBridge on testing
        environment: dockercloud-test
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  clean: true

                - task: InstallSSHKey@0
                  displayName: Install SSH key
                  inputs:
                    knownHostsEntry: $(DOCKERCLOUD_KNOWN_HOSTS)
                    sshPublicKey: $(DOCKERCLOUD_SSH_PUBLIC_KEY)
                    sshKeySecureFile: dockercloud-ssh-private-key

                - bash: |
                    set -euo pipefail
                    ssh "$(remoteUser)@$(remoteHost)" "cd /data && sudo ./update.sh $(deployTarget)"
                    ssh "$(remoteUser)@$(remoteHost)" "sudo docker service ps webapps_coursebridge-test --no-trunc"
                    ssh "$(remoteUser)@$(remoteHost)" "sudo docker service logs --since 5m webapps_coursebridge-test 2>&1 | tail -n 200"
                  displayName: Update testing service
