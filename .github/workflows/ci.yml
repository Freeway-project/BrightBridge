name: CI

on:
  push:
    branches: [ft-AzureMigration]
  pull_request:
    branches: [ft-AzureMigration]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: SOURCE
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: SOURCE/package-lock.json

      - name: Install workspace deps
        run: npm ci

      - name: Typecheck (turbo)
        run: npm run typecheck

      - name: Web app tests
        working-directory: SOURCE/apps/web
        run: npm test

  docker-build:
    name: Docker image build (verify only)
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: SOURCE
          file: SOURCE/Dockerfile
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  mirror-to-azdo:
    name: Mirror ft-AzureMigration -> azdo/testing
    runs-on: ubuntu-latest
    needs: [verify, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/ft-AzureMigration'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Azure DevOps testing branch
        env:
          AZDO_PAT: ${{ secrets.AZDO_PAT }}
        run: |
          if [ -z "${AZDO_PAT}" ]; then
            echo "AZDO_PAT secret is not set. Add it under repo Settings -> Secrets and variables -> Actions." >&2
            exit 1
          fi
          # Authenticate via a GIT_ASKPASS helper. URL has placeholder user so
          # git doesn't fall through to the terminal prompt; askpass supplies
          # the real PAT for the password challenge.
          cat > "${RUNNER_TEMP}/askpass.sh" <<'EOF'
#!/bin/bash
case "$1" in
  *Username*) echo "pat" ;;
  *Password*) echo "${AZDO_PAT}" ;;
esac
EOF
          chmod +x "${RUNNER_TEMP}/askpass.sh"
          AZDO_URL="https://okanagan.visualstudio.com/DefaultCollection/CourseBridge/_git/CourseBridge"
          GIT_ASKPASS="${RUNNER_TEMP}/askpass.sh" \
          GIT_TERMINAL_PROMPT=0 \
          AZDO_PAT="${AZDO_PAT}" \
          git -c credential.helper= push "${AZDO_URL}" "HEAD:refs/heads/testing"
